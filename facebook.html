<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Clone</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    display:flex;
    min-height:100vh;
}

/* LEFT SIDE */

.left{
    width:50%;
    padding:40px;
    border-right:1px solid #ddd;
}

.logo{
    color:#1877f2;
    font-size:55px;
}

.content{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
}

.content h1{
    font-size:72px;
    font-weight:300;
    line-height:1.05;
}

.content h1 span{
    color:#1877f2;
}

.content img{
    width:400px;
}

/* RIGHT SIDE */

.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:75%;
    max-width:550px;
}

.login-box h2{
    font-size:40px;
    margin-bottom:30px;
}

.login-box input{
    width:100%;
    padding:18px;
    margin-bottom:20px;
    border:1px solid #d8d8d8;
    border-radius:15px;
    outline:none;
    font-size:18px;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:#1877f2;
    color:white;
    font-size:22px;
    cursor:pointer;
}

.login-btn:hover{
    background:#166fe5;
}

.login-box a{
    display:block;
    text-align:center;
    margin:30px 0;
    text-decoration:none;
    color:black;
    font-size:18px;
}

.create-btn{
    width:100%;
    padding:15px;
    border:2px solid #1877f2;
    border-radius:30px;
    background:transparent;
    color:#1877f2;
    font-size:22px;
    cursor:pointer;
}

.meta{
    text-align:center;
    margin-top:35px;
    font-size:24px;
}

/* RESPONSIVE */

@media(max-width:900px){

    .container{
        flex-direction:column;
    }

    .left,
    .right{
        width:100%;
    }

    .content{
        flex-direction:column;
        text-align:center;
    }

    .content h1{
        font-size:50px;
    }

    .content img{
        width:300px;
    }
}
</style>
<body>

    <div class="container">

        <!-- LEFT SIDE -->

        <div class="left">

            <div class="logo">
                <i class="fa-brands fa-facebook-f"></i>
            </div>

            <div class="content">

                <h1>
                    Explore<br>
                    the things<br>
                    <span>you love.</span>
                </h1>

                <img src="https://static.xx.fbcdn.net/rsrc.php/yb/r/HpEiFYDux5j.webp"
                     alt="facebook image">

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right">

            <div class="login-box">

                <h2>Log in to Facebook</h2>

                <input type="text"
                placeholder="Email address or mobile number">

                <input type="password"
                placeholder="Password">

                <button class="login-btn">Log in</button>

                <a href="#">Forgotten password?</a>

                <button class="create-btn">
                    Create new account
                </button>

                <p class="meta">
                    <i class="fa-brands fa-meta"></i> Meta
                </p>

            </div>

        </div>

    </div>

</body>
</html>
