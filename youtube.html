<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Clone </title>
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    
    .header{
        height: 80px;
        width: 100%;
        box-shadow: 0px 0px 10px gray;
        display: flex;
        align-items: center;
        padding-left: 20px;
        gap: 20px;
        position:relative;
        justify-content:space-between;
    }
    .header img{
        width: 40px;
        height: 40px;
        /* float: left;
        margin-top: 15px;
        margin-left: 20px; */
    }
    .header input{
        align-items: center;
    }
    .header input{
        width: 400px;
        height: 40px;
        border: 2px solid black;
        border-radius: 20px;
        padding-left: 50px;
        font-size: 16px;
    }
    .left{
        width: 80px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding-top: 20px;
    }
</style>
<body>
    <div class="header">
        <div class="left">
        <img src="youtubeimages/menu.png" alt="Menu">
        <img src="youtubeimages/youtubename.png" alt="outube name Y">
        </div>
        <div class="center">
        <input type="text" placeholder="search">
        </div>
        <img src="youtubeimages/search.png" alt="">
        <img src="youtubeimages/voice-search.png" alt="">
        <img src="youtubeimages/Jack.png" alt="">
    </div>
    <div class="left">
        <img src="youtubeimages/home.png" alt="Home">
        <img src="youtubeimages/subscriprion.png" alt="sub">
        <img src="youtubeimages/save.png" alt="Profile">
    </div>
    
</body>
</html>
