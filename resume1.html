<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            border: 1px solid blue;
            height: 100vh;
            width: 65vw;
            margin: auto;

            display: grid;
            grid-template-columns: 1fr 2fr;
        }

        .left {
            border: 1px solid green;
            display: flex;
            /* justify-content: center;
            align-items: center; */
        }

        .right {
            border: 1px solid red;
        }

        img {
            border: 1px solid blue;
            width: 100px;
            height: 100px;
        }
    
    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <img src="https://img.freepik.com/premium-vector/people-avatar-profile-icon-female-face-with-different-face-expressions_1246656-679.jpg"
                alt="avatar">
                <h1> profile</h1>
        </div>

        <div class="right">
        </div>

    </div>

</body>
</html>
